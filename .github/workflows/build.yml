name: Build and Release Video-Hub-App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_on_windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Locate package.json and Install
        run: |
          # 自动寻找 package.json 所在的目录并进入
          $packagePath = Get-ChildItem -Recurse -Filter "package.json" | Select-Object -First 1 -ExpandProperty DirectoryName
          Write-Host "Found package.json in: $packagePath"
          cd $packagePath
          npm install --force
          
          # 将该路径存入环境变量，供后续步骤使用
          echo "PROJECT_ROOT=$packagePath" >> $env:GITHUB_ENV

      - name: Build Electron App (EXE)
        run: |
          cd ${{ env.PROJECT_ROOT }}
          npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Video-Hub-App-Exe
          # 动态匹配生成的 exe 文件
          path: "**/dist/*.exe"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "**/dist/*.exe"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
